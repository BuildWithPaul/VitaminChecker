services:
  vitaminchecker:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: vitaminchecker
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - APPLICATION_ROOT=/vitaminchecker
    volumes:
      - ../uploads:/app/uploads

  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - vitaminchecker

volumes:
  caddy_data:
  caddy_config: