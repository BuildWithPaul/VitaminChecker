services:
  vitamin-checker:
    build: .
    ports:
      - "5000:5000"
    volumes:
      # Persist uploaded receipts across container restarts
      - ./uploads:/app/uploads
      # Persist EasyOCR model cache across container rebuilds (~100MB)
      - easyocr_models:/app/.EasyOCR
    environment:
      - FLASK_ENV=production
      - EASYOCR_MODULE_PATH=/app/.EasyOCR
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    restart: unless-stopped
    tmpfs:
      - /tmp:size=50M

volumes:
  easyocr_models: