services:
  vitamin-checker:
    build: .
    ports:
      - "5000:5000"
    volumes:
      # Persist uploaded receipts across container restarts
      - ./uploads:/app/uploads
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-me-to-a-random-secret-in-production}
    restart: unless-stopped
    # Security: read-only root filesystem except /app/uploads and /tmp
    read_only: true
    tmpfs:
      - /tmp:size=50M